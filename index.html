<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Runner - Sobrevivência</title>
  <!-- Usando a CDN que funcionou perfeitamente para você -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Animação de descida corrigida para ir até o final da área de jogo */
    .gate-fall {
      animation: fall linear forwards;
    }
    @keyframes fall {
        0% { 
          transform: translateY(-20px); 
          opacity: 0; 
        }
        15% { 
          opacity: 1; 
        }
        100% { 
          transform: translateY(450px); /* Define uma distância física fixa para a queda */
          opacity: 0; 
        }
    }

  </style>
</head>
<body class="bg-slate-900 text-white font-sans overflow-hidden select-none h-screen w-screen flex flex-col items-center justify-between p-4">

  
  <!-- Tela de Boas-Vindas / Start -->
  <div id="tela-start" class="fixed inset-0 bg-slate-950 flex flex-col items-center justify-content-center z-[100] p-4 text-white">
    <h1 class="text-4xl font-black mb-6 tracking-wider text-amber-400">MATH FALLOUT</h1>
    
    <div class="w-full max-w-xs flex flex-col gap-4">
      <label class="text-sm font-bold text-slate-400 uppercase">Insira suas Iniciais (Fliperama):</label>
      <input 
        id="nome-jogador" 
        type="text" 
        maxlength="7" 
        placeholder="Ex: DAVI454" 
        class="bg-slate-900 border-2 border-slate-700 rounded-lg p-3 text-center text-2xl font-black uppercase tracking-widest focus:outline-none focus:border-amber-400 text-amber-300"
      />
      
      <button 
        id="btn-start" 
        class="bg-amber-500 hover:bg-amber-400 text-slate-950 font-black p-4 rounded-lg text-xl shadow-lg transition-transform active:scale-95 cursor-pointer"
      >
        START GAME
      </button>
    </div>
  </div>

  
  <!-- TOPO: Painel de Pontuação e Status -->
  <div class="w-full max-w-md flex justify-between items-center bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg z-10">
    <div>
      <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">Pontuação</p>
      <p id="score-display" class="text-2xl font-black text-amber-400">0</p>
    </div>
    <div class="text-right">
      <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">Dificuldade</p>
      <p id="level-display" class="text-xl font-bold text-blue-400">Nível 1</p>
    </div>
  </div>

  <!-- CENTRO: Área de Jogo -->
  <div id="game-area" class="relative w-full max-w-md flex-1 my-4 bg-slate-950/50 rounded-2xl border border-slate-800/80 overflow-hidden">
    <div id="gates-container" class="absolute w-full flex justify-around px-2"></div>
  </div>

  <!-- BASE: O Nosso Soldado -->
  <div class="w-full max-w-md bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg flex flex-col items-center gap-2 z-10">
    <div class="flex items-center gap-3">
      <span class="text-3xl">🪖</span>
      <div>
        <p class="text-xs text-slate-400 font-bold">HP DO SOLDADO</p>
        <p id="hp-display" class="text-3xl font-black text-emerald-400">10</p>
      </div>
    </div>
    <div class="w-full bg-slate-950 h-3 rounded-full overflow-hidden border border-slate-700">
      <div id="hp-bar" class="bg-emerald-500 h-full transition-all duration-300" style="width: 100%;"></div>
    </div>
  </div>

  <!-- TELA DE GAME OVER -->
  <div id="gameover-screen" class="hidden absolute inset-0 bg-slate-950/90 flex flex-col items-center justify-center p-6 z-20">
    <h1 class="text-5xl font-black text-red-500 tracking-tight mb-2">GAME OVER</h1>
    <p class="text-slate-400 text-lg mb-6">O HP do seu soldado chegou a zero!</p>
    <div class="bg-slate-800 p-4 rounded-lg mb-8 text-center border border-slate-700 min-w-[200px]">
      <p class="text-xs text-slate-400 font-bold">PONTOS CONSEGUIDOS</p>
      <p id="final-score" class="text-4xl font-black text-amber-400">0</p>
    </div>
    <div class="mt-6 w-full max-w-xs bg-slate-900/60 p-4 rounded-xl border border-white/5">
      <h3 class="text-center font-black text-amber-400 uppercase tracking-widest text-lg mb-3">🏆 Top 10 Líderes</h3>
      <!-- É aqui dentro que o JavaScript vai desenhar a lista clássica -->
      <ol id="lista-ranking" class="flex flex-col gap-2 font-mono text-sm">
        <li class="text-slate-500 text-center animate-pulse">Carregando placar...</li>
      </ol>
    </div>

    <button id="btn-restart" class="px-8 py-4 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-bold text-xl rounded-xl transition-all shadow-lg active:scale-95">
      Jogar Novamente
    </button>
  </div>

  <script>
        let hp = 20;
        let score = 0;
        let nivel = 1;
        let tempoDecorrido = 0;
        let drenoPorSegundo = 1;
        let velocidadeQueda = 4; // Ajustado de 5 para 4 segundos para ficar mais dinâmico
        
        let loopDreno, loopGerador;
    
        const hpDisplay = document.getElementById('hp-display');
        const hpBar = document.getElementById('hp-bar');
        const scoreDisplay = document.getElementById('score-display');
        const levelDisplay = document.getElementById('level-display');
        const gatesContainer = document.getElementById('gates-container');
        const gameoverScreen = document.getElementById('gameover-screen');
        const finalScore = document.getElementById('final-score');
        const btnRestart = document.getElementById('btn-restart');

        // Variáveis Globais de Controle
        let apelidoJogador = "";
        let jogoAtivo = false;
        
        const telaStart = document.getElementById('tela-start');
        const inputNome = document.getElementById('nome-jogador');
        const btnStart = document.getElementById('btn-start');
  
        btnStart.addEventListener('click', () => {
          // Pega o nome tirando espaços e jogando para Letras Maiúsculas
          const nomeDigitado = inputNome.value.trim().toUpperCase();
          
          // Validação simples: Não deixa jogar sem nome
          if (nomeDigitado === "") {
            alert("Por favor, digite seu apelido de piloto!");
            return;
          }
          
          // Guarda o nome globalmente para usar no envio do ranking no final
          apelidoJogador = nomeDigitado;
          jogoAtivo = true;
          // Esconde a tela de start usando classes do Tailwind
          telaStart.classList.add('hidden');
          iniciarJogo(); // Aquela função que cria os 3 botões caindo
        });
    
    
        function iniciarJogo() {
            hp = 20;
            score = 0;
            nivel = 1;
            tempoDecorrido = 0;
            drenoPorSegundo = 1;
            velocidadeQueda = 6;
            
            gatesContainer.innerHTML = '';
            gameoverScreen.classList.add('hidden');
            atualizarInterface();
      
            loopDreno = setInterval(processarDrenoTempo, 2000);
            // Sincronizado: os botões caem em 4s e a próxima leva vem em 4s
            loopGerador = setInterval(gerarPortoes, 6000); 
            
            gerarPortoes(); 
        }
    
        function processarDrenoTempo() {
            hp -= drenoPorSegundo;
            tempoDecorrido++;
            score += 10; 
      
            if (tempoDecorrido === 30) {
              nivel = 2;
              drenoPorSegundo = 3; 
              velocidadeQueda = 4; 
              alterarGerador(4000); // Gera mais rápido para acompanhar a queda
            } else if (tempoDecorrido === 60) {
              nivel = 3;
              drenoPorSegundo = 5; 
              velocidadeQueda = 3; 
              alterarGerador(3000); // Ritmo frenético
            }
      
            atualizarInterface();
      
            if (hp <= 0) {
              finalizarJogo();
            }
        }
    
        function alterarGerador(novoTempo) {
            clearInterval(loopGerador);
            loopGerador = setInterval(gerarPortoes, novoTempo);
            gerarPortoes(); // Força uma geração imediata na mudança de nível
        }
    
        function atualizarInterface() {
              hpDisplay.textContent = Math.max(0, hp);
              scoreDisplay.textContent = score;
              levelDisplay.textContent = `Nível ${nivel}`;
        
              if (hp > 25) {
                hpDisplay.className = "text-3xl font-black text-cyan-400 animate-pulse";
                hpBar.className = "bg-cyan-500 h-full transition-all duration-300";
              } else if (hp > 5) {
                hpDisplay.className = "text-3xl font-black text-emerald-400";
                hpBar.className = "bg-emerald-500 h-full transition-all duration-300";
              } else {
                hpDisplay.className = "text-3xl font-black text-red-500 animate-bounce";
                hpBar.className = "bg-red-500 h-full transition-all duration-300";
              }
        
              let larguraBarra = (hp / 50) * 100;
              hpBar.style.width = `${Math.min(100, Math.max(0, larguraBarra))}%`;
        }
    
        function gerarPortoes() {
            // Remove apenas os botões antigos que já perderam a animação ou foram ignorados
            gatesContainer.innerHTML = ''; 
            // Exemplo com nível 2 -> Dificuldade 4
            const dificuldadeNivel = nivel * 2; 
            
            let formulasDisponiveis = [
                // GANHOS (5 opções)
                { txt: `(HP * 2) - ${dificuldadeNivel}`, acao: (h) => (h * 2) - dificuldadeNivel, cor: 'bg-rose-700' }, // ⚠️ GANHO NO BOTÃO VERMELHO
                { txt: `HP + (${dificuldadeNivel} * 3)`, acao: (h) => h + (dificuldadeNivel * 3), cor: 'bg-indigo-600' },
                { txt: `(HP + 10) * 1.5`, acao: (h) => Math.round((h + 10) * 1.5), cor: 'bg-emerald-600' }, 
                { txt: `(100 / HP) * ${dificuldadeNivel}`, acao: (h) => Math.round((100 / h) * dificuldadeNivel), cor: 'bg-amber-600' },
                { txt: `HP - (${dificuldadeNivel} - 15)`, acao: (h) => h - (dificuldadeNivel - 15), cor: 'bg-sky-600' },
              
                // 🔴 FÓRMULAS DE PERDA (Vida Desce)
                { txt: `(HP - ${dificuldadeNivel}) * 2`, acao: (h) => Math.max(0, (h - dificuldadeNivel) * 2), cor: 'bg-rose-700' }, // ⚠️ PERDA NO BOTÃO VERMELHO
                { txt: `HP - (${dificuldadeNivel} * 4)`, acao: (h) => Math.max(0, h - (dificuldadeNivel * 4)), cor: 'bg-emerald-600' }, // ⚠️ PERDA NO BOTÃO VERDE
                { txt: `(HP / 2) + ${dificuldadeNivel}`, acao: (h) => Math.round((20 / 2) + dificuldadeNivel), cor: 'bg-amber-600' },
                { txt: `(HP * 0.5) + ${dificuldadeNivel}`, acao: (h) => Math.round((h * 0.5) + dificuldadeNivel), cor: 'bg-indigo-600' },
                { txt: `HP - (${dificuldadeNivel} * ${dificuldadeNivel})`, acao: (h) => Math.max(0, h - (dificuldadeNivel * dificuldadeNivel)), cor: 'bg-sky-600' }
            ];
            let rodadaResolvida = false;
            formulasDisponiveis.sort(() => Math.random() - 0.5);
            // Adicione o parâmetro 'index' no forEach
            formulasDisponiveis.forEach((item, index) => {
                const btn = document.createElement('button');
                // CORREÇÃO 1: Adicionado 'cursor-pointer' para garantir a captura e 'select-none'
                btn.className = `w-[28%] p-2 rounded-lg text-xl font-black text-center shadow-lg border border-white/10 active:scale-95 transition-all absolute gate-fall top-0 z-50 btn-dinamico cursor-pointer select-none ${item.cor}`;
                // CALCULA A POSIÇÃO HORIZONTAL COM ESPAÇAMENTO SEGURO
                // Mudado para 36% para os 3 botões de 28% ocuparem bem a tela sem sumir na direita
                const posicaoHorizontal = index * 36; 
                btn.style.left = `${posicaoHorizontal}%`;
                  
                btn.style.top = '0px'; 
                btn.style.animationDuration = `${velocidadeQueda}s`;
                btn.textContent = item.txt;
                btn.id = `btn-dinamico-${index}`;
          
                // 1. CAPTURA O CLIQUE E FAZ O CÁLCULO
                btn.addEventListener('click', (evento) => {
                    // CORREÇÃO 2: Impede que a animação interfira no clique no frame exato
                    evento.preventDefault();
                    evento.stopPropagation();
                    let hpAtual = hp; 
                    let novoHp = item.acao(hpAtual);        
                    hp = novoHp;
                    const todosOsBotoes = document.querySelectorAll('.btn-dinamico');
                    todosOsBotoes.forEach((b) => {
                        // Trava a animação de queda no ar instantaneamente!
                        b.style.animationPlayState = 'paused';
                        b.classList.add('pointer-events-none'); // Desativa cliques futuros
          
                        if (b.id !== `btn-dinamico-${index}`) {
                            b.classList.add('opacity-10', 'grayscale'); // Apaga os outros
                        } else {
                            // Destaca o botão que você clicou de verde ou vermelho
                            const aumentou = novoHp > hpAtual;
                            b.classList.add('scale-110', 'ring-4');
                            // Adiciona a cor do anel baseada no resultado
                            if (aumentou) {
                                    b.classList.add('ring-green-400');
                                } else {
                                    b.classList.add('ring-red-500');
                            }
                        }    
                    });
                });
            
                btn.addEventListener('animationend', () => {
                    // Se a rodada terminou e o jogador NÃO clicou em nada, e NINGUÉM foi punido ainda...
                    if (!rodadaResolvida) {
                        rodadaResolvida = true;  
                        let punicao = nivel * 20;
                        hp = Math.max(0, hp - punicao); 
                    }
        
                    btn.remove();
                });

          
                gatesContainer.appendChild(btn);
            });
        }
        function finalizarJogo() {
            clearInterval(loopDreno);
            clearInterval(loopGerador);
            const botoesSobreviventes = document.querySelectorAll('.btn-dinamico');
            botoesSobreviventes.forEach(botao => botao.remove());
            finalScore.textContent = score;
            gameoverScreen.classList.remove('hidden');
            salvarPontuacao(apelidoJogador, score);
        }

        async function salvarPontuacao(nomeJogador, pontosMarcados) {
            // ⚠️ Substitua com as suas credenciais reais quando criar sua conta gratuita no Supabase
            const SUPABASE_URL = 'https://zqdjkazwinzmmtwgpycn.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_s3vcDX41fY9DA48qO8k80g_cZTOckMg';
          
            try {
              // Faz um envio POST padrão (Adiciona sempre uma nova linha, igual fliperama)
              const resposta = await fetch(`${SUPABASE_URL}/rest/v1/ranking`, {
                method: 'POST',
                headers: {
                  'apikey': SUPABASE_KEY,
                  'Authorization': `Bearer ${SUPABASE_KEY}`,
                  'Content-Type': 'application/json',
                  'Prefer': 'return=minimal' // Diz ao banco para processar rápido sem devolver dados pesados
                },
                body: JSON.stringify({ 
                  nome: nomeJogador, 
                  pontos: pontosMarcados 
                })
              });
          
              if (resposta.ok) {
                console.log(`Pontuação de ${nomeJogador} (${pontosMarcados}s) salva com sucesso no fliperama global!`);
                
                // BÔNUS PEDAGÓGICO: Assim que salvar com sucesso, puxa o ranking atualizado
                carregarTopRanking(); 
              } else {
                console.error("O banco recusou os dados. Verifique a tabela.");
              }
            } catch (erro) {
              console.error("Erro de conexão com o banco de dados:", erro);
            }
      }

    
      async function carregarTopRanking() {
          // Credenciais (As mesmas que usar na função de salvar)
          const SUPABASE_URL = 'https://zqdjkazwinzmmtwgpycn.supabase.co';
          const SUPABASE_KEY = 'sb_publishable_s3vcDX41fY9DA48qO8k80g_cZTOckMg';
          
          const listaContenedor = document.getElementById('lista-ranking');
          if (!listaContenedor) return;
        
          try {
            // URL mágica: filtra apenas nome e pontos, ordena por pontos em ordem decrescente (desc) e limita aos 10 melhores
            const url = `${SUPABASE_URL}/rest/v1/ranking?select=nome,pontos&order=pontos.desc&limit=10`;
        
            const resposta = await fetch(url, {
              method: 'GET',
              headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`
              }
            });
        
            if (resposta.ok) {
              const dadosRanking = await resposta.json();
              
              // Limpa a mensagem de "Carregando..."
              listaContenedor.innerHTML = '';
        
              // Se o banco estiver totalmente vazio no primeiro teste
              if (dadosRanking.length === 0) {
                listaContenedor.innerHTML = `<li class="text-slate-500 text-center">Nenhum recorde ainda!</li>`;
                return;
              }
        
              // Loop clássico para desenhar cada linha do fliperama
              dadosRanking.forEach((jogador, index) => {
                const itemLista = document.createElement('li');
                
                // Estilização condicional: os 3 primeiros ganham cores especiais de pódio
                let corPosicao = 'text-slate-400';
                if (index === 0) corPosicao = 'text-amber-400 font-bold'; // 1º Lugar Ouro
                if (index === 1) corPosicao = 'text-slate-300 font-bold'; // 2º Lugar Prata
                if (index === 2) corPosicao = 'text-amber-600 font-bold'; // 3º Lugar Bronze
        
                // Monta a estrutura clássica: "1. DAVI454 .......... 700s"
                itemLista.className = "flex justify-between items-center py-1 border-b border-white/5 last:border-0";
                itemLista.innerHTML = `
                  <span class="${corPosicao}">${index + 1}. ${jogador.nome}</span>
                  <span class="text-amber-200/80 font-bold">${jogador.pontos}s</span>
                `;
                
                listaContenedor.appendChild(itemLista);
              });
            } else {
              listaContenedor.innerHTML = `<li class="text-red-400 text-center">Erro ao atualizar placar</li>`;
            }
          } catch (erro) {
            console.error("Erro ao carregar dados do ranking:", erro);
            listaContenedor.innerHTML = `<li class="text-red-400 text-center">Erro de conexão</li>`;
          }
        }

        // Configura o botão de jogar novamente para quando der Game Over
        // btnRestart.addEventListener('click', iniciarJogo);

        // O evento do botão de START da tela de login deve ser o único a disparar o jogo no início:
        btnStart.addEventListener('click', () => {
            const nomeDigitado = inputNome.value.trim().toUpperCase();
            if (nomeDigitado === "") {
                alert("Digite seu nome de piloto!");
                return;
            }
            apelidoJogador = nomeDigitado;
            telaStart.classList.add('hidden'); // Esconde a tela de login
            
            iniciarJogo(); // Agora sim, o jogo só começa por comando humano!
        });
 

  </script>
</body>
</html>
